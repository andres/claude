services:
  universal-db-mcp:
    build: .
    ports:
      - "8088:8088"
    environment:
      MODE: http
      HTTP_PORT: "8088"
      # Uncomment and set a secret key to require API key auth on all requests:
      # API_KEYS: "your-secret-key"
    command:
      - --type
      - mysql
      - --host
      - mysql
      - --port
      - "3306"
      - --user
      - bear_development
      - --password
      - bear
      - --database
      - ${CURRENT_DB:-bear3_development}
      # Read-only by default. Change to readwrite or full if needed:
      - --permission-mode
      - safe
    networks:
      - bear_default
    restart: unless-stopped

networks:
  bear_default:
    external: true
